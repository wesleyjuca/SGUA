name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate server syntax
        run: node --check server.js

      - name: Check required files
        run: |
          test -f server.js       && echo "✓ server.js"
          test -f public/index.html && echo "✓ index.html"
          test -f .env.example    && echo "✓ .env.example"
          test -f render.yaml     && echo "✓ render.yaml"

      - name: Check DATABASE_URL is documented
        run: grep -q DATABASE_URL .env.example
