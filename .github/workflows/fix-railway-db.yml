name: Fix Railway DATABASE_URL

on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-railway-db.yml']

jobs:
  update-db-url:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Atualizar DATABASE_URL no Railway
        env:
          RAILWAY_TOKEN: de5e264b-e156-4ca9-8a13-b95a6c7b564a
        run: |
          npx @railway/cli@latest variables set \
            DATABASE_URL="postgresql://sgua_app.ylbhtjpbejwqgxudrikz:SguaApp2026Key@aws-0-us-east-1.pooler.supabase.com:6543/postgres" \
            --service sgua 2>&1 || true
          echo "DATABASE_URL enviado ao Railway."

      - name: Remover este workflow (executa apenas uma vez)
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase
          git rm .github/workflows/fix-railway-db.yml
          git commit -m "chore: remover workflow one-time Railway fix"
          git push
