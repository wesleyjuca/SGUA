name: Atualizar DATABASE_URL no Railway

on:
  workflow_dispatch:
    inputs:
      railway_token:
        description: 'Token Railway (Settings → Tokens → New Token)'
        required: true
        type: string

jobs:
  update-db-url:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Atualizar DATABASE_URL no serviço sgua
        env:
          RAILWAY_TOKEN: ${{ inputs.railway_token }}
        run: |
          npx @railway/cli@latest variables set \
            DATABASE_URL="postgresql://sgua_app.ylbhtjpbejwqgxudrikz:SguaApp2026Key@aws-0-us-east-1.pooler.supabase.com:6543/postgres" \
            --service sgua 2>&1
          echo "✅ DATABASE_URL atualizado. Railway vai redeployar automaticamente."
