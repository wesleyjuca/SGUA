// SEGURANÇA — SHA-256 puro JS (sync) · sem dependências externas
// ══════════════════════════════════════════════════════════════════════════════
function sha256(msg){
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
         0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
         0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
         0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
         0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
         0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
         0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
         0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  function rr(w,n){return(w>>>n)|(w<<(32-n));}
  // UTF-8 encode (suporta pares substitutos / emoji)
  var bytes=Array.from(new TextEncoder().encode(String(msg||'')));
  var blen=bytes.length*8;
  bytes.push(0x80);
  while(bytes.length%64!==56)bytes.push(0);
  for(var i=7;i>=0;i--)bytes.push((blen/Math.pow(2,i*8))&255);
  // Process chunks
  for(var ck=0;ck<bytes.length;ck+=64){
    var w=[];
    for(var i=0;i<16;i++)w[i]=(bytes[ck+i*4]<<24)|(bytes[ck+i*4+1]<<16)|(bytes[ck+i*4+2]<<8)|bytes[ck+i*4+3];
    for(var i=16;i<64;i++){
      var s0=rr(w[i-15],7)^rr(w[i-15],18)^(w[i-15]>>>3);
      var s1=rr(w[i-2],17)^rr(w[i-2],19)^(w[i-2]>>>10);
      w[i]=(w[i-16]+s0+w[i-7]+s1)>>>0;
    }
    var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],hh=H[7];
    for(var i=0;i<64;i++){
      var S1=rr(e,6)^rr(e,11)^rr(e,25),ch=(e&f)^(~e&g);
      var t1=(hh+S1+ch+K[i]+w[i])>>>0;
      var S0=rr(a,2)^rr(a,13)^rr(a,22),maj=(a&b)^(a&c)^(b&c);
      var t2=(S0+maj)>>>0;
      hh=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;
    }
    H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;
    H[4]=(H[4]+e)>>>0;H[5]=(H[5]+f)>>>0;H[6]=(H[6]+g)>>>0;H[7]=(H[7]+hh)>>>0;
  }
  return H.map(function(n){return('00000000'+(n>>>0).toString(16)).slice(-8);}).join('');
}

// Sanitização — remove tags HTML e limita comprimento
function sanitize(str,maxLen){
  if(typeof str!=='string')return '';
  var s=str.replace(/<[^>]*>/g,'').replace(/[<>"'`]/g,'').trim();
  return maxLen?s.slice(0,maxLen):s;
}

function fileToDataUrl(file){
  return new Promise(function(resolve,reject){
    if(!file) return resolve("");
    var reader=new FileReader();
    reader.onload=function(){resolve(String(reader.result||""));};
    reader.onerror=function(){reject(new Error("Falha ao processar arquivo."));};
    reader.readAsDataURL(file);
  });
}

// Validação de campos com regras declarativas
// rules: [{field, label, required, maxLen, pattern, patternMsg}]
function validateFields(obj,rules){
  var errs=[];
  rules.forEach(function(r){
    var v=obj[r.field];
    if(r.required&&(!v||String(v).trim()===''))errs.push(r.label+' é obrigatório.');
    if(v&&r.maxLen&&String(v).length>r.maxLen)errs.push(r.label+': máximo '+r.maxLen+' caracteres.');
    if(v&&r.pattern&&!r.pattern.test(String(v)))errs.push(r.label+': '+(r.patternMsg||'formato inválido'));
    if(v&&r.min!==undefined&&Number(v)<r.min)errs.push(r.label+': mínimo '+r.min+'.');
    if(v&&r.max!==undefined&&Number(v)>r.max)errs.push(r.label+': máximo '+r.max+'.');
  });
  return errs; // [] = válido
}


// ══════════════════════════════════════════════════════════════════════════════
// PERSISTÊNCIA — localStorage (dados de negócio apenas, jamais senhas)
// ══════════════════════════════════════════════════════════════════════════════
var SK='sagcu_v4_'; // versão do schema — bump para invalidar cache antigo
var LS_WARNED={};
function storageWarnOnce(code,msg){
  if(LS_WARNED[code]) return;
  LS_WARNED[code]=true;
  console.warn('SAGCU storage warning:',msg);
}
function lsGet(key,fallback){
  var storageKey=SK+key;
  try{
    var r=localStorage.getItem(storageKey);
    if(!r) return fallback;
    try{return JSON.parse(r);}
    catch(e){
      storageWarnOnce('parse_'+key,'Dados corrompidos em "'+storageKey+'". Cache local foi resetado para este item.');
      localStorage.removeItem(storageKey);
      return fallback;
    }
  }catch(e){
    storageWarnOnce('read_'+key,'Falha ao ler "'+storageKey+'": '+(e&&e.message?e.message:String(e)));
    return fallback;
  }
}
function lsSet(key,data){
  var storageKey=SK+key;
  try{localStorage.setItem(storageKey,JSON.stringify(data));return true;}
  catch(e){
    storageWarnOnce('write_'+key,'Falha ao persistir "'+storageKey+'": '+(e&&e.message?e.message:String(e)));
    return false;
  }
}
function lsClear(){
  try{Object.keys(localStorage).filter(function(k){return k.startsWith(SK);}).forEach(function(k){localStorage.removeItem(k);});}
  catch(e){
    storageWarnOnce('clear','Falha ao limpar cache local: '+(e&&e.message?e.message:String(e)));
  }
}

function apiSyncFeeds(feedsAtivos,newsExistentes){
  if(!feedsAtivos||!feedsAtivos.length) return Promise.resolve({ok:false,added:0,feeds:[],warnings:['Nenhum feed ativo.']});
  var feedsResult=[];var novasNoticias=[];
  var ativos=feedsAtivos.filter(function(f){return f.ativo;});
  if(!ativos.length) return Promise.resolve({ok:false,added:0,feeds:[],warnings:['Nenhum feed ativo encontrado.']});
  var promises=ativos.map(function(f){
    var proxyUrl='https://api.allorigins.win/get?disableCache=true&url='+encodeURIComponent(f.url);
    var ctrl=typeof AbortController!=='undefined'?new AbortController():null;
    var timer=ctrl?setTimeout(function(){ctrl.abort();},12000):null;
    return fetch(proxyUrl,ctrl?{signal:ctrl.signal}:{})
      .then(function(r){if(timer)clearTimeout(timer);return r.json();})
      .then(function(data){
        if(!data.contents) return;
        var parser=new DOMParser();
        var xml=parser.parseFromString(data.contents,'text/xml');
        var items=Array.from(xml.querySelectorAll('item,entry'));
        var idExistentes=new Set((newsExistentes||[]).map(function(n){return n.titulo;}));
        items.slice(0,10).forEach(function(item){
          var titulo=((item.querySelector('title')||{}).textContent||'').trim().slice(0,120);
          var resumo=((item.querySelector('description,summary')||{}).textContent||'').replace(/<[^>]*>/g,'').trim().slice(0,200);
          var dataStr=((item.querySelector('pubDate,published,updated')||{}).textContent||new Date().toISOString());
          if(!titulo||idExistentes.has(titulo)) return;
          idExistentes.add(titulo);
          novasNoticias.push({id:Date.now()+Math.random(),titulo:titulo,resumo:resumo,conteudo:'',
            data:new Date(dataStr).toISOString().slice(0,10),categoria:f.categoria||'Gestão',
            unidade:'',destaque:false,visivel:true,fonte:f.nome,autor:f.nome,orgaosPresentes:[],ocupacaoAtual:0});
        });
        feedsResult.push(Object.assign({},f,{sync:new Date().toISOString().slice(0,10)}));
      }).catch(function(e){console.warn('[SGUA] Feed error:',f.nome,e);});
  });
  return Promise.all(promises).then(function(){
    var newsAtualizada=(newsExistentes||[]).concat(novasNoticias);
    return {ok:true,added:novasNoticias.length,news:newsAtualizada,feeds:feedsResult,
      warnings:novasNoticias.length===0?['Nenhuma notícia nova encontrada.']:[]};
  });
}


// ══════════════════════════════════════════════════════════════════════════════
// DOMÍNIO — approveUso(uns, setUns, unidadeId, orgaoData) : {ok, err?, orgao?}
// Regras:
//   1. Unidade deve existir e estar ativa (status !== 'inativo')
//   2. Impede duplicação: mesmo orgão ativo na mesma unidade
//   3. Incrementa ocupacaoAtual
//   4. Insere registro {id, nome, tipo, dataEntrada, ativo:true}
//   5. Persiste no estado (setUns) e no localStorage
// ══════════════════════════════════════════════════════════════════════════════
function approveUso(uns, setUns, unidadeId, orgaoData){
  // 1. Encontrar unidade
  var u=uns.find(function(x){return x.id===unidadeId;});
  if(!u) return {ok:false, err:'Unidade não encontrada (id='+unidadeId+')'};
  if(u.status==='inativo') return {ok:false, err:'Unidade "'+u.nome+'" está inativa e não pode receber órgãos.'};

  // 2. Sanitizar e validar campos do orgão
  var nome=sanitize(String(orgaoData.nome||''),100);
  var tipo=sanitize(String(orgaoData.tipo||''),60);
  var errs=validateFields({nome:nome,tipo:tipo},[
    {field:'nome',label:'Nome do órgão',required:true,maxLen:100},
    {field:'tipo',label:'Tipo do evento',required:true,maxLen:60}
  ]);
  if(errs.length) return {ok:false, err:errs.join(' ')};

  // 3. Impedir duplicação — mesmo orgão ativo na unidade
  var presentes=u.orgaosPresentes||[];
  var jaAtivo=presentes.find(function(o){
    return o.ativo && o.nome.toLowerCase()===nome.toLowerCase();
  });
  if(jaAtivo) return {ok:false, err:'Órgão "'+nome+'" já está ativo nesta unidade desde '+formatData(jaAtivo.dataEntrada)+'.'};

  // 4. Criar registro do órgão
  var novoOrgao={
    id:String(Date.now())+'_'+Math.random().toString(36).slice(2,6),
    nome:nome,
    tipo:tipo,
    dataEntrada:new Date().toISOString().split('T')[0],
    ativo:true
  };

  // 5. Persistir — atualizar estado e localStorage
  var resultado={ok:true, orgao:novoOrgao};
  setUns(function(us){
    var atualizadas=us.map(function(un){
      if(un.id!==unidadeId) return un;
      var novaLista=(un.orgaosPresentes||[]).concat([novoOrgao]);
      var ativos=novaLista.filter(function(o){return o.ativo;}).length;
      var novaOcupacao={id:novoOrgao.id,orgao:nome,tipo:orgaoData.semPrevisao?'perm':'temp',espacos:1,
        dataInicio:novoOrgao.dataEntrada,dataFim:orgaoData.semPrevisao?null:(orgaoData.dtFim||null),motivo:tipo,ativo:true};
      var novasOcupacoes=(un.ocupacoes||[]).concat([novaOcupacao]);
      return Object.assign({},un,{orgaosPresentes:novaLista,ocupacaoAtual:ativos,ocupacoes:novasOcupacoes});
    });
    lsSet('uns',atualizadas); // persistência imediata
    return atualizadas;
  });
  return resultado;
}

// leaveUso — desativa um órgão na unidade (checkout)
function leaveUso(uns, setUns, unidadeId, orgaoId){
  var u=uns.find(function(x){return x.id===unidadeId;});
  if(!u) return {ok:false, err:'Unidade não encontrada'};
  var org=(u.orgaosPresentes||[]).find(function(o){return o.id===orgaoId;});
  if(!org) return {ok:false, err:'Órgão não encontrado nesta unidade'};
  if(!org.ativo) return {ok:false, err:'Órgão já está inativo'};

  setUns(function(us){
    var atualizadas=us.map(function(un){
      if(un.id!==unidadeId) return un;
      var novaLista=(un.orgaosPresentes||[]).map(function(o){
        return o.id===orgaoId?Object.assign({},o,{ativo:false,dataSaida:new Date().toISOString().split('T')[0]}):o;
      });
      var ativos=novaLista.filter(function(o){return o.ativo;}).length;
      return Object.assign({},un,{orgaosPresentes:novaLista, ocupacaoAtual:ativos});
    });
    lsSet('uns',atualizadas);
    return atualizadas;
  });
  return {ok:true};
}

function getOcupacoesEm(un,dateStr){
  var d=dateStr||new Date().toISOString().split('T')[0];
  return (un.ocupacoes||[]).filter(function(o){
    if(!o.ativo) return false;
    if(o.dataInicio>d) return false;
    if(o.dataFim&&o.dataFim<d) return false;
    return true;
  });
}
function getDisponibilidade(un,dateStr){
  var cap=un.capacidade||((un.quartos||0)+(un.salas||0))||1;
  var ativas=getOcupacoesEm(un,dateStr);
  var usados=ativas.reduce(function(a,o){return a+(o.espacos||1);},0);
  var livre=Math.max(0,cap-usados);
  return {total:cap,usados:Math.min(usados,cap),livre:livre,pct:Math.round((usados/cap)*100)};
}
function temConflito(un,novaOc){
  var cap=un.capacidade||((un.quartos||0)+(un.salas||0))||1;
  var ini=novaOc.dataInicio,fim=novaOc.dataFim;
  if(!ini) return false;
  var dataTeste=ini,iteracoes=0;
  while(true){
    var d=getDisponibilidade(un,dataTeste);
    if(d.livre<(novaOc.espacos||1)) return true;
    if(!fim||dataTeste>=fim) break;
    var dt=new Date(dataTeste+'T12:00:00');
    dt.setDate(dt.getDate()+1);
    dataTeste=dt.toISOString().split('T')[0];
    if(++iteracoes>365) break;
  }
  return false;
}
function runSysCheck(uns,sols,monLog,dbOffline,alertRules){
  var hoje=new Date().toISOString().split('T')[0];
  var now=Date.now();
  var alertas=[];
  var rules=alertRules||PERS_DEF.alertRules||[];
  var ruleById=function(id){return rules.find(function(r){return r.id===id;});};
  var rSolDias=ruleById('sol_dias');var thSol=(rSolDias&&rSolDias.ativo!==false)?((rSolDias.threshold||5)):5;
  var pendLong=sols.filter(function(s){return s.st==='pendente'&&s.dt&&(now-new Date(s.dt+'T12:00:00').getTime())>thSol*86400000;});
  if(pendLong.length) alertas.push({sev:'alta',titulo:'Solicitações antigas',det:pendLong.length+' solicitação(ões) pendente(s) há mais de '+thSol+' dias.',sug:'Revisar e aprovar/rejeitar na aba Solicitações.'});
  var rOcp=ruleById('ocp_critica');var thOcp=(rOcp&&rOcp.ativo!==false)?((rOcp.threshold||80)):80;
  uns.forEach(function(u){
    var d=getDisponibilidade(u,hoje);
    if(d.pct>=thOcp&&u.status==='ativo') alertas.push({sev:'alta',titulo:'Unidade quase cheia',det:u.nome+': '+d.pct+'% de capacidade em uso.',sug:'Verificar e gerenciar ocupações.'});
  });
  var semCap=uns.filter(function(u){return !u.capacidade;});
  if(semCap.length) alertas.push({sev:'media',titulo:'Capacidade indefinida',det:semCap.length+' unidade(s) sem capacidade configurada.',sug:'Editar unidade → aba Ocupação → definir capacidade total.'});
  var jsErrs=monLog.filter(function(e){return e.type==='js_err';}).length;
  if(jsErrs>=3) alertas.push({sev:'alta',titulo:'Erros JavaScript',det:jsErrs+' erros detectados na sessão.',sug:'Abrir DevTools (F12 → Console) para identificar erros.'});
  if(dbOffline) alertas.push({sev:'alta',titulo:'Banco offline',det:'Supabase inacessível. Dados persistidos localmente.',sug:'Verificar conectividade e configurações do Supabase.'});
  var inativas=uns.filter(function(u){return !u.visivel;});
  if(inativas.length>0) alertas.push({sev:'baixa',titulo:'Unidades ocultas',det:inativas.length+' unidade(s) ocultas do público.',sug:'Verificar se a ocultação é intencional em Unidades.'});
  return {
    ts:now,alertas:alertas,
    sugestoes:['Configurar backup automático semanal dos dados via Supabase.','Adicionar exportação de relatórios de ocupação em PDF.','Implementar notificações automáticas para solicitações aprovadas.','Criar indicadores públicos de desempenho ambiental.','Configurar alertas por e-mail para ocupações críticas.'],
    jsErrs:jsErrs,pendentes:sols.filter(function(s){return s.st==='pendente';}).length,
    unidades:uns.length,ocAtivas:uns.reduce(function(a,u){return a+(u.ocupacaoAtual||0);},0)
  };
}

// --- Exportação CSV ---
function escapeCsvCell(v){
  var s=String(v===null||v===undefined?'':v);
  s=s.replace(/[\r\n]+/g,' ');
  if(s.indexOf(',')!==-1||s.indexOf('"')!==-1||s.indexOf(';')!==-1){
    s='"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}
function exportCSV(rows, cols, filename){
  var lines=[cols.map(function(c){return '"'+c.label+'"';}).join(',')];
  rows.forEach(function(row){
    lines.push(cols.map(function(c){return escapeCsvCell(c.fmt(row));}).join(','));
  });
  var blob=new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
}

// --- Exportação XLSX (SheetJS obrigatório) ---
function exportXLSX(rows, cols, filename){
  if(typeof XLSX==='undefined'){alert('SheetJS não carregado. Use a exportação CSV.');return;}
  var data=[cols.map(function(c){return c.label;})];
  rows.forEach(function(row){
    data.push(cols.map(function(c){
      var v=c.fmt(row);
      return(v===null||v===undefined)?'':v;
    }));
  });
  var ws=XLSX.utils.aoa_to_sheet(data);
  // Largura automática
  var wscols=cols.map(function(c,i){
    var max=c.label.length;
    rows.forEach(function(row){var v=String(c.fmt(row)||'');if(v.length>max)max=v.length;});
    return{wch:Math.min(Math.max(max+2,8),60)};
  });
  ws['!cols']=wscols;
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Dados');
  XLSX.writeFile(wb,filename);
}

function exportPDF(rows,cols,basename,pers,filtros){
  var jsPDFCls=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
  if(!jsPDFCls){alert('jsPDF não carregado. Tente novamente em instantes.');return;}
  var doc=new jsPDFCls({orientation:'landscape',unit:'mm',format:'a4'});
  var pw=doc.internal.pageSize.getWidth();
  var ph=doc.internal.pageSize.getHeight();
  var now=new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  // Header verde
  doc.setFillColor(15,92,58);
  doc.rect(0,0,pw,24,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);doc.setFont(undefined,'bold');
  doc.text(pers&&pers.nomeApp?pers.nomeApp:'SGUA',14,10);
  doc.setFontSize(8);doc.setFont(undefined,'normal');
  doc.text(basename+' · Gerado em '+now,14,17);
  if(filtros&&filtros.length){doc.text('Filtros: '+filtros.join(' | '),14,22);}
  // Tabela
  doc.autoTable({
    startY:28,

    body:rows.map(function(row){return cols.map(function(c){var v=c.fmt(row);return v===null||v===undefined?'':String(v);});}),
    styles:{fontSize:7,cellPadding:1.5,overflow:'linebreak'},

      }

  });
  doc.save(basename+'.pdf');
}

// --- Parser CSV robusto (RFC 4180) ---
function parseCSVLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=ch;
  }
  result.push(cur.trim());
  return result;
}
function parseCSV(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2) return{headers:[],rows:[]};
  var headers=parseCSVLine(lines[0]).map(function(h){return h.replace(/^"+|"+$/g,'');});
  var rows=lines.slice(1).map(function(line){
    var vals=parseCSVLine(line);
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]!==undefined?vals[i].replace(/^"+|"+$/g,''):'';});
    return obj;
  });
  return{headers:headers,rows:rows};
}

// --- Validação de linha importada (unidades) ---
var UN_IMPORT_RULES=[
  {field:'tipo',  label:'Tipo',  required:true, pattern:/^(CIMA|UGAI)$/, patternMsg:'deve ser CIMA ou UGAI'},
  {field:'nome',  label:'Nome',  required:true, maxLen:100},
  {field:'municipio',label:'Município',required:true,maxLen:80},
  {field:'regional',label:'Regional', required:false,maxLen:60},
  {field:'status',label:'Status',required:false,pattern:/^(ativo|manutencao|inativo)$/,patternMsg:'deve ser ativo, manutencao ou inativo'},
  {field:'taxaUso',label:'Taxa Uso',required:false,min:0,max:100}
];
function validateUnRow(row){
  var errs=validateFields(row,UN_IMPORT_RULES);
  var lat=parseFloat(row.lat||row['Latitude']||'');
  var lng=parseFloat(row.lng||row['Longitude']||'');
  if(isNaN(lat)||lat<-90||lat>90) errs.push('Latitude inválida (esperado -90 a 90)');
  if(isNaN(lng)||lng<-180||lng>180) errs.push('Longitude inválida (esperado -180 a 180)');
  return errs;
}

// Mapear linha CSV para objeto unidade
function csvRowToUnidade(row){
  var lat=parseFloat(row.lat||row['Latitude']||'');
  var lng=parseFloat(row.lng||row['Longitude']||'');
  return{
    id:null, // será atribuído no merge
    tipo:sanitize(row.tipo||row['Tipo']||'CIMA',10),
    nome:sanitize(row.nome||row['Nome']||'',100),
    municipio:sanitize(row.municipio||row['Município']||'',80),
    regional:sanitize(row.regional||row['Regional']||'Vale do Juruá',60),
    coords:{lat:isNaN(lat)?-9.5:lat, lng:isNaN(lng)?-70.5:lng},
    status:(row.status||row['Status']||'ativo'),
    taxaUso:Math.min(100,Math.max(0,parseInt(row.taxaUso||row['Taxa Uso(%)'||'Taxa Uso']||'0'))),
    orgaos:(row.orgaos||row['Órgãos']||'').split(';').map(function(s){return s.trim();}).filter(Boolean),
    quartos:parseInt(row.quartos||row['Quartos']||'0')||0,
    salas:parseInt(row.salas||row['Salas']||'0')||0,
    cozinha:(row.cozinha||row['Cozinha']||'Não').toLowerCase()==='sim',
    auditorio:(row.auditorio||row['Auditório']||'Não').toLowerCase()==='sim',
    visivel:(row.visivel||row['Visível']||'Sim').toLowerCase()!=='não',
    decreto:sanitize(row.decreto||row['Decreto']||'',120),
    descricao:sanitize(row.descricao||row['Descrição']||'',500),
    historia:'', foto:'', galeria:[], extras:[], orgaosPresentes:[], ocupacaoAtual:0
  };
}

// Aplicar import com estratégia merge ou overwrite
// strategy: 'merge' (mantém existentes) | 'overwrite' (substitui por nome)
function applyImport(uns, parsedRows, strategy){
  var valid=parsedRows.filter(function(r){return r._errs.length===0;});
  if(!valid.length) return uns;
  if(strategy==='overwrite'){
    var novos=valid.map(function(r){return Object.assign({},r._obj,{id:Date.now()+Math.random()});});
    var nomesNovos=novos.map(function(u){return u.nome.toLowerCase();});
    // manter unidades que não estão no import e adicionar as novas
    var mantidos=uns.filter(function(u){return nomesNovos.indexOf(u.nome.toLowerCase())===-1;});
    return mantidos.concat(novos);
  } else { // merge
    var result=uns.slice();
    valid.forEach(function(r){
      var obj=r._obj;
      var existeIdx=result.findIndex(function(u){return u.nome.toLowerCase()===obj.nome.toLowerCase();});
      if(existeIdx===-1){
        result.push(Object.assign({},obj,{id:Date.now()+Math.random()}));
      }
      // merge: ignora existentes (deduplicação por nome)
    });
    return result;
  }
}

// AdminRelatorios — aba de relatórios com export/import

function AdminRelatorios(p){
  var uns=p.uns,setUns=p.setUns,news=p.news,sols=p.sols,toast2=p.toast2,pers=p.pers||PERS_DEF;

  var sFmt=useState('csv');var fmt=sFmt[0],setFmt=sFmt[1];
  var sSt=useState('merge');var strategy=sSt[0],setStrategy=sSt[1];
  var sPR=useState(null);var parsedRows=sPR[0],setParsedRows=sPR[1];
  var sFL=useState('');var fileName=sFL[0],setFileName=sFL[1];
  var sLoad=useState(false);var loading=sLoad[0],setLoading=sLoad[1];
  var sFDE=useState('');var dateStart=sFDE[0],setDateStart=sFDE[1];
  var sFDS=useState('');var dateEnd=sFDS[0],setDateEnd=sFDS[1];
  var sFSt=useState('');var filtroStatus=sFSt[0],setFiltroStatus=sFSt[1];

  var DATASETS={
    uns:{label:'Unidades',cols:UN_COLS,rows:uns},
    news:{label:'Notícias',cols:NW_COLS,rows:news},
    sols:{label:'Solicitações',cols:SOL_COLS,rows:sols},
    ocp:{label:'Ocupação por Órgão',cols:OCP_COLS,rows:buildOcupacaoRows(uns)}
  };

  function doExport(){
    var ts=new Date().toISOString().slice(0,10);
    var base='SEMA_'+ds.label.replace(/ /g,'_')+'_'+ts;
    var filteredRows=ds.rows.filter(function(r){
      if(dateStart&&r.dt&&r.dt<dateStart)return false;
      if(dateEnd&&r.dt&&r.dt>dateEnd)return false;
      if(filtroStatus&&r.st&&r.st!==filtroStatus)return false;
      return true;
    });
    var filtros=[];
    if(dateStart)filtros.push('De: '+formatData(dateStart));
    if(dateEnd)filtros.push('Até: '+formatData(dateEnd));
    if(filtroStatus)filtros.push('Status: '+filtroStatus);
    if(fmt==='pdf'){exportPDF(filteredRows,ds.cols,base,pers,filtros);toast2('PDF gerado: '+base+'.pdf');}
    else if(fmt==='xlsx'){exportXLSX(filteredRows,ds.cols,base+'.xlsx');toast2('Exportado: '+base+'.xlsx');}
    else{exportCSV(filteredRows,ds.cols,base+'.csv');toast2('Exportado: '+base+'.csv');}
  }

  function handleFile(e){
    var file=e.target.files[0];
    if(!file){setParsedRows(null);return;}
    setFileName(file.name);
    setLoading(true);
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var rows=[];
        var isXlsx=file.name.toLowerCase().endsWith('.xlsx');
        if(isXlsx){
          if(typeof XLSX==='undefined'){alert('SheetJS não carregado. Use CSV.');setLoading(false);return;}
          var wb=XLSX.read(ev.target.result,{type:'binary'});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var data=XLSX.utils.sheet_to_json(ws,{defval:''});
          rows=data.map(function(r){
            var errs=validateUnRow(r);
            return{_raw:r,_errs:errs,_obj:errs.length===0?csvRowToUnidade(r):null};
          });
        } else {
          var parsed=parseCSV(ev.target.result);
          rows=parsed.rows.map(function(r){
            var errs=validateUnRow(r);
            return{_raw:r,_errs:errs,_obj:errs.length===0?csvRowToUnidade(r):null};
          });
        }
        setParsedRows(rows);
      }catch(err){toast2('Erro ao processar arquivo: '+err.message,C.rm);}
      setLoading(false);
    };
    if(file.name.toLowerCase().endsWith('.xlsx'))reader.readAsBinaryString(file);
    else reader.readAsText(file,'UTF-8');
  }

  function doImport(){
    if(!parsedRows) return;
    var valid=parsedRows.filter(function(r){return r._errs.length===0;});
    if(!valid.length){toast2('Nenhuma linha válida para importar.',C.am);return;}

    lsSet('uns',novas);

    setParsedRows(null);setFileName('');

    h('h2',{style:{fontSize:20,fontWeight:700,margin:'0 0 4px',color:C.cd}},'Relatórios'),

      [['export','📤 Exportar'],['import','📥 Importar']].map(function(t){
        return h('button',{key:t[0],onClick:function(){setTab(t[0]);},
          style:{background:'none',border:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t[0]?700:400,
                 color:tab===t[0]?C.g2:C.cm,padding:'8px 16px',
                 borderBottom:tab===t[0]?'2px solid '+C.g2:'2px solid transparent',marginBottom:-1}
        },t[1]);
      })
    ),

    // ─── ABA EXPORTAR ───────────────────────────────────────────
    tab==='export'&&h('div',null,
      // Seletor de dataset
      h('div',{style:{marginBottom:16}},
        h('label',{style:{fontSize:11,fontWeight:700,color:C.cm,display:'block',marginBottom:8}},'CONJUNTO DE DADOS'),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
          Object.entries(DATASETS).map(function(entry){
            var k=entry[0],v=entry[1];
            return h('button',{key:k,onClick:function(){setDataset(k);},
              style:Object.assign({},btnBase,{
                background:dataset===k?C.gx:'#fff',
                color:dataset===k?C.g2:C.cm,
                border:'1px solid '+(dataset===k?C.g2:C.cl)
              })

          })

        h('div',null,
          h('label',{style:{fontSize:11,fontWeight:700,color:C.cm,display:'block',marginBottom:4}},'DE'),
          h('input',{type:'date',value:dateStart,onChange:function(e){setDateStart(e.target.value);},style:{padding:'7px 10px',border:'1px solid '+C.cl,borderRadius:8,fontSize:12}})

// Painel de órgãos presentes numa unidade (exibido na aba 'estrutura')
function PainelOcupacao(p){
  var u=p.u,uns=p.uns,setUns=p.setUns,curUser=p.curUser,toast2=p.toast2;
  var sNome=useState('');var nome=sNome[0],setNome=sNome[1];
  var sTipo=useState('');var tipo=sTipo[0],setTipo=sTipo[1];
  var sErr=useState('');var err=sErr[0],setErr=sErr[1];
  var presentes=u.orgaosPresentes||[];
  var ativos=presentes.filter(function(o){return o.ativo;});
  var historico=presentes.filter(function(o){return!o.ativo;});

  function handleApprove(){
    setErr('');
    var res=approveUso(uns,setUns,u.id,{nome:nome,tipo:tipo});
    if(res.ok){setNome('');setTipo('');toast2('Órgão "'+res.orgao.nome+'" registrado com sucesso.');}
    else{setErr(res.err);}
  }
  function handleLeave(orgaoId){
    var res=leaveUso(uns,setUns,u.id,orgaoId);
    if(res.ok) toast2('Saída registrada.');
    else setErr(res.err);
  }

  var cor=u.tipo==='CIMA'?C.g2:C.b1;
  var podeEditar=curUser&&(curUser.perfil==='admin'||curUser.permissoes.units);
  var lbl={fontSize:11,color:C.cm,display:'block',marginBottom:4,fontWeight:600};

  return h('div',null,
    // Resumo
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:20}},
      h(StatBox,{label:'Órgãos ativos',value:ativos.length,color:C.g2,icon:'🏢'}),
      h(StatBox,{label:'Ocupação atual',value:(u.ocupacaoAtual||ativos.length),color:u.taxaUso>80?C.rm:cor,icon:'📊'}),
      h(StatBox,{label:'Histórico',value:historico.length,color:C.cm,icon:'📋'})
    ),

    // Lista de ativos
    ativos.length>0&&h(Card,{style:{padding:'16px 18px',marginBottom:14}},
      h('div',{style:{fontSize:11,fontWeight:700,color:C.cm,marginBottom:10,letterSpacing:.5}},'ÓRGÃOS ATIVOS'),
      ativos.map(function(o){
        return h('div',{key:o.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'0.5px solid '+C.cl,flexWrap:'wrap',gap:6}},
          h('div',null,
            h('div',{style:{fontSize:13,fontWeight:600,color:C.cd}},o.nome),
            h('div',{style:{fontSize:11,color:C.cm}},'Tipo: '+o.tipo+' · Entrada: '+formatData(o.dataEntrada))
          ),
          podeEditar&&h('button',{onClick:function(){handleLeave(o.id);},
            style:{padding:'4px 12px',borderRadius:7,border:'1px solid '+C.rm,background:C.rl,color:C.rm,fontSize:11,cursor:'pointer'}
          },'Registrar saída')
        );
      })
    ),

    // Formulário de entrada (só para quem pode editar)
    podeEditar&&h(Card,{style:{padding:'16px 18px',marginBottom:14}},
      h('div',{style:{fontSize:11,fontWeight:700,color:C.g2,marginBottom:12,letterSpacing:.5}},'REGISTRAR ENTRADA DE ÓRGÃO'),
      err&&h('div',{style:{background:C.rl,borderRadius:7,padding:'8px 12px',fontSize:12,color:C.rm,marginBottom:10}},err),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:10,alignItems:'flex-end'}},
        h('div',null,
          h('label',{style:lbl},'Nome do órgão *'),
          h('input',{value:nome,onChange:function(e){setNome(e.target.value);},placeholder:'Ex: SEAGRI, IBAMA...'})
        ),
        h('div',null,
          h('label',{style:lbl},'Tipo de uso *'),
          h('input',{value:tipo,onChange:function(e){setTipo(e.target.value);},placeholder:'Ex: Capacitação, Reunião...'})
        ),
        h('button',{onClick:handleApprove,
          style:{padding:'8px 14px',borderRadius:8,border:'none',background:C.g2,color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}
        },'+ Registrar')
      )
    ),

    // Histórico de saídas
    historico.length>0&&h('div',null,
      h('div',{style:{fontSize:11,fontWeight:700,color:C.cm,marginBottom:8,letterSpacing:.5}},'HISTÓRICO DE SAÍDAS'),
      historico.map(function(o){
        return h('div',{key:o.id,style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'0.5px solid '+C.cl,fontSize:12,color:C.cm}},
          h('span',null,o.nome+' ('+o.tipo+')'),
          h('span',null,formatData(o.dataEntrada)+' → '+(o.dataSaida?formatData(o.dataSaida):'—'))
        );
      })
    ),

    !ativos.length&&!podeEditar&&h('p',{style:{fontSize:13,color:C.cm,fontStyle:'italic'}},'Nenhum órgão ativo no momento.')
  );
}

function MapView(p){
  var units=p.units||[],height=p.height||"400px",compact=p.compact||false,
      singleUnit=p.singleUnit||false,onSelectUnit=p.onSelectUnit;
  var mapOpts={lat:p.centerLat,lng:p.centerLng,zoom:p.zoom};
  var valid=useMemo(function(){return units.filter(function(u){return u.coords&&u.coords.lat&&u.coords.lng;});},[units]);
  var key=useMemo(function(){return JSON.stringify(valid.map(function(u){return u.id;}));},[valid]);
  var html=useMemo(function(){return buildMapHtml(valid,compact,singleUnit,mapOpts);},[key,compact,singleUnit,p.centerLat,p.centerLng,p.zoom]);

  useEffect(function(){
    function handler(e){if(e.data&&e.data.type==="SELECT_UNIT"&&onSelectUnit)onSelectUnit(e.data.unitId);}
    window.addEventListener("message",handler);
    return function(){window.removeEventListener("message",handler);};
  },[onSelectUnit]);

  if(!valid.length) return h("div",{style:{height:height,borderRadius:12,background:C.cx,display:"flex",alignItems:"center",justifyContent:"center",color:C.cm,fontSize:14,border:"1px solid "+C.cl}},"Nenhuma unidade com coordenadas válidas.");
  return h("iframe",{key:key,srcDoc:html,sandbox:"allow-scripts allow-same-origin",style:{width:"100%",height:height,border:"none",borderRadius:12,display:"block"},title:"Mapa SEMA/AC"});
}

// ─── CALENDÁRIO DE DISPONIBILIDADE ───────────────────────────────────────────
function CalendarioSol(p){
  var hoje=new Date();
  var sM=useState(hoje.getMonth());var mes=sM[0],setMes=sM[1];
  var sY=useState(hoje.getFullYear());var ano=sY[0],setAno=sY[1];
  var un=p.uns&&p.uns.find(function(u){return u.nome===p.unId;});
  function navMes(d){
    var nm=mes+d;
    if(nm<0){setMes(11);setAno(function(y){return y-1;});}
    else if(nm>11){setMes(0);setAno(function(y){return y+1;});}
    else setMes(nm);
  }
  var MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var DIAS=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  var primeiroDia=new Date(ano,mes,1).getDay();
  var ultimoDia=new Date(ano,mes+1,0).getDate();
  var hojeStr=hoje.toISOString().split('T')[0];
  var cells=[];
  for(var i=0;i<primeiroDia;i++) cells.push(null);
  for(var d=1;d<=ultimoDia;d++) cells.push(d);
  var minBlock=p.minDate||hojeStr;
  function getDayStyle(d){
    var dateStr=ano+'-'+String(mes+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(dateStr<minBlock) return {bg:'#F7F8F5',c:'#9BA88F',cursor:'default'};
    if(!un) return {bg:'#F7F8F5',c:'#6B7260',cursor:'pointer'};
    if(un.status==='manutencao') return {bg:'#FFF3E0',c:'#C4832A',cursor:'not-allowed'};
    var disp=getDisponibilidade(un,dateStr);
    if(disp.livre===0) return {bg:'#FCEBEB',c:'#A32D2D',cursor:'not-allowed'};
    if(disp.pct>=70) return {bg:'#FFF3E0',c:'#C4832A',cursor:'pointer'};
    return {bg:'#EAF7EE',c:'#1A7A4A',cursor:'pointer'};
  }
  return h("div",{style:{border:"1px solid #DEE2D8",borderRadius:12,overflow:"hidden",background:"#fff"}},
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#0F5C3A"}},
      h("button",{onClick:function(){navMes(-1);},style:{background:"none",border:"none",color:"#fff",fontSize:18,cursor:"pointer",padding:"0 8px"}},"‹"),
      h("span",{style:{color:"#fff",fontWeight:700,fontSize:14}},MESES[mes]+" "+ano),
      h("button",{onClick:function(){navMes(1);},style:{background:"none",border:"none",color:"#fff",fontSize:18,cursor:"pointer",padding:"0 8px"}},"›")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#EAF7EE",borderBottom:"1px solid #DEE2D8"}},
      DIAS.map(function(d){return h("div",{key:d,style:{textAlign:"center",padding:"6px 0",fontSize:11,fontWeight:700,color:"#6B7260"}},d);})),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,padding:6}},
      cells.map(function(d,i){
        if(!d) return h("div",{key:"e"+i});
        var dc=getDayStyle(d);
        var dateStr=ano+'-'+String(mes+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        var isSel=p.selectedDate===dateStr;
        return h("div",{key:d,onClick:function(){if(dc.cursor==='pointer')p.onSelectDate(dateStr);},
          style:{textAlign:"center",padding:"7px 4px",borderRadius:8,cursor:dc.cursor,
            background:isSel?'#1A7A4A':dc.bg,color:isSel?'#fff':dc.c,
            fontWeight:isSel?700:400,fontSize:13,
            border:isSel?'2px solid #0F5C3A':'2px solid transparent',transition:'all .1s'}},d);
      })
    ),
    h("div",{style:{display:"flex",gap:16,padding:"8px 12px",borderTop:"1px solid #DEE2D8",fontSize:11,color:"#6B7260",flexWrap:"wrap"}},
      [["#EAF7EE","Disponível"],["#FFF3E0","Parcial"],["#FCEBEB","Ocupado"],["#F7F8F5","Bloqueado"]].map(function(it){
        return h("span",{key:it[1],style:{display:"flex",alignItems:"center",gap:4}},
          h("span",{style:{width:10,height:10,borderRadius:3,background:it[0],border:"1px solid #DEE2D8",display:"inline-block"}}),it[1]);
      })
    )
  );
}

// ADMIN BACKUPS
// ══════════════════════════════════════════════════════════════════════════════
function AdminBackups(p){
  var C=p.C,toast2=p.toast2;
  var sList=useState([]);var list=sList[0],setList=sList[1];
  var sLoad=useState(true);var loading=sLoad[0],setLoad=sLoad[1];
  var sBusy=useState(false);var busy=sBusy[0],setBusy=sBusy[1];
  function loadList(){
    setLoad(true);
    fetch('/api/backup').then(function(r){return r.json();})
      .then(function(r){if(r.ok)setList(r.data||[]);setLoad(false);})
      .catch(function(){setLoad(false);});
  }
  useEffect(function(){loadList();},[]);
  function doBackup(){
    setBusy(true);
    fetch('/api/backup',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})
      .then(function(r){return r.json();})
      .then(function(r){
        setBusy(false);
        if(r.ok){toast2('Backup criado: '+r.data.size_kb+' KB');loadList();}
        else toast2(r.error||'Erro ao criar backup.',C.rm);
      }).catch(function(){setBusy(false);toast2('Erro de conexão.',C.rm);});
  }
  function doRestore(id,label){
    if(!window.confirm('Restaurar backup "'+label+'"?\nO estado atual do sistema será substituído.'))return;
    fetch('/api/backup/'+id+'/restore',{method:'POST'})
      .then(function(r){return r.json();})
      .then(function(r){
        if(r.ok){toast2('Restaurado. Recarregando…');setTimeout(function(){window.location.reload();},1500);}
        else toast2(r.error||'Erro ao restaurar.',C.rm);
      }).catch(function(){toast2('Erro de conexão.',C.rm);});
  }
  function doDelete(id){
    if(!window.confirm('Excluir este backup?'))return;
    fetch('/api/backup/'+id,{method:'DELETE'})
      .then(function(){loadList();toast2('Backup excluído.',C.am);});
  }
  return h('div',null,
    h('h2',{style:{fontSize:20,fontWeight:700,margin:'0 0 4px',color:C.cd}},'Backups'),
    h('p',{style:{fontSize:13,color:C.cm,margin:'0 0 20px'}},'Gerencie cópias de segurança do estado completo do sistema.'),
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}},
      h('div',{style:{background:C.gx,borderRadius:10,padding:'10px 14px',fontSize:12,color:C.cd}},
        '🕐 Backup automático: toda domingo às 02:00 (horário de Acre). Retenção: 30 cópias.'
      ),
      h('button',{onClick:doBackup,disabled:busy,style:{padding:'9px 20px',borderRadius:9,border:'none',background:C.g2,color:'#fff',fontSize:13,fontWeight:700,cursor:busy?'default':'pointer',opacity:busy?.6:1}},busy?'Aguarde…':'💾 Fazer backup agora')
    ),
    loading?h('div',{style:{textAlign:'center',padding:24,color:C.cm,fontSize:13}},'Carregando backups…'):
    !list.length?h('div',{style:{textAlign:'center',padding:32,color:C.cm,fontSize:13}},'Nenhum backup encontrado. Crie o primeiro clicando em "Fazer backup agora".'):
    h('div',{style:{overflowX:'auto'}},
      h('table',{style:{width:'100%',fontSize:12,borderCollapse:'collapse'}},
        h('thead',null,h('tr',null,['Data','Descrição','Tamanho','Ações'].map(function(t){
          return h('th',{key:t,style:{textAlign:'left',padding:'8px 10px',borderBottom:'1px solid '+C.cl,color:C.cm,fontWeight:600,background:C.cx}},t);
        }))),
        h('tbody',null,list.map(function(bk,i){
          return h('tr',{key:bk.id,style:{background:i%2?C.cx:'#fff'}},
            h('td',{style:{padding:'8px 10px',borderBottom:'0.5px solid '+C.cl,color:C.cd}},new Date(bk.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})),
            h('td',{style:{padding:'8px 10px',borderBottom:'0.5px solid '+C.cl,color:C.cd}},bk.label),
            h('td',{style:{padding:'8px 10px',borderBottom:'0.5px solid '+C.cl,color:C.cm}},(bk.size_kb||0)+' KB'),
            h('td',{style:{padding:'8px 10px',borderBottom:'0.5px solid '+C.cl}},
              h('div',{style:{display:'flex',gap:6}},
                h('button',{onClick:function(){doRestore(bk.id,bk.label);},style:{padding:'4px 10px',borderRadius:7,border:'1px solid '+C.g2,background:'#fff',color:C.g2,fontSize:11,fontWeight:600,cursor:'pointer'}},'Restaurar'),
                h('button',{onClick:function(){doDelete(bk.id);},style:{padding:'4px 10px',borderRadius:7,border:'1px solid '+C.rm,background:'#fff',color:C.rm,fontSize:11,fontWeight:600,cursor:'pointer'}},'Excluir')
              )
            )
          );
        }))
      )
    )
  );
}

// ADMIN — SOLICITAÇÕES DE CADASTRO
// ══════════════════════════════════════════════════════════════════════════════
function AdminRegReqs(p){
  var C=p.C,toast2=p.toast2,curUser=p.curUser,setUsers=p.setUsers;
  var sReqs=useState([]);var reqs=sReqs[0],setReqs=sReqs[1];
  var sLoad=useState(true);var loading=sLoad[0],setLoad=sLoad[1];
  var sObs=useState({});var obsMap=sObs[0],setObsMap=sObs[1];
  useEffect(function(){
    setLoad(true);
    fetch('/api/reg-requests').then(function(r){return r.json();})
      .then(function(r){if(r.ok)setReqs(r.data||[]);setLoad(false);})
      .catch(function(){setLoad(false);});
  },[]);
  function review(rq,status){
    var obs=obsMap[rq.id]||'';
    fetch('/api/reg-requests/'+rq.id,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status:status,obs:obs,reviewed_by:curUser?curUser.id:null})})
      .then(function(r){return r.json();})
      .then(function(r){
        if(!r.ok){toast2(r.error||'Erro.',C.rm);return;}
        setReqs(function(rs){return rs.map(function(x){return x.id===rq.id?r.data:x;});});
        if(status==='aprovado'){
          var novoUser={id:Date.now(),nome:rq.nome,email:rq.email,perfil:'viewer',ativo:true,
            criadoEm:new Date().toISOString().split('T')[0],unitIds:[],
            pwdHash:hashPwd('Mudar@123'),permissoes:Object.assign({},PD.viewer)};
          setUsers(function(us){return us.concat([novoUser]);});
          toast2('Aprovado! Usuário criado. Senha provisória: Mudar@123');
        } else {toast2('Solicitação rejeitada.',C.am);}
      }).catch(function(){toast2('Erro de conexão.',C.rm);});
  }
  var stPill={pendente:[C.am,C.al],aprovado:[C.g2,C.gx],rejeitado:[C.rm,C.rl]};
  return h('div',null,
    h('h3',{style:{fontSize:15,fontWeight:700,color:C.cd,marginBottom:12}},'Solicitações de Acesso'),
    loading?h('div',{style:{padding:20,color:C.cm,fontSize:13}},'Carregando…'):
    !reqs.length?h('div',{style:{padding:20,color:C.cm,fontSize:13,textAlign:'center'}},'Nenhuma solicitação de cadastro recebida.'):
    h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
      reqs.map(function(rq){
        var sp=stPill[rq.status]||[C.cm,C.cx];
        return h('div',{key:rq.id,style:{background:'#fff',border:'1px solid '+C.cl,borderRadius:12,padding:14}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}},
            h('div',null,
              h('div',{style:{fontSize:13,fontWeight:700,color:C.cd}},rq.nome),
              h('div',{style:{fontSize:11,color:C.cm}},rq.email+(rq.cargo?' · '+rq.cargo:'')+(rq.organizacao?' · '+rq.organizacao:'')),
              h('div',{style:{fontSize:11,color:C.cm,marginTop:2}},new Date(rq.created_at).toLocaleDateString('pt-BR'))
            ),
            h('span',{style:{fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:20,background:sp[1],color:sp[0]}},rq.status)
          ),
          rq.justificativa&&h('div',{style:{fontSize:12,color:C.cd,marginBottom:8,background:C.cx,borderRadius:8,padding:'8px 10px'}},rq.justificativa),
          rq.status==='pendente'&&h('div',{style:{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}},
            h('input',{type:'text',value:obsMap[rq.id]||'',onChange:function(e){setObsMap(function(m){var o=Object.assign({},m);o[rq.id]=e.target.value;return o;});},placeholder:'Observação (opcional)',style:{flex:1,padding:'7px 10px',borderRadius:8,border:'1px solid '+C.cl,fontSize:12,minWidth:120}}),
            h('button',{onClick:function(){review(rq,'aprovado');},style:{padding:'7px 14px',borderRadius:8,border:'none',background:C.g2,color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}},'Aprovar'),
            h('button',{onClick:function(){review(rq,'rejeitado');},style:{padding:'7px 14px',borderRadius:8,border:'1px solid '+C.rm,background:'#fff',color:C.rm,fontSize:12,fontWeight:700,cursor:'pointer'}},'Rejeitar')
          ),
          rq.obs&&h('div',{style:{fontSize:11,color:C.cm,marginTop:6,fontStyle:'italic'}},'Obs: '+rq.obs)
        );
      })
    )
  );
}

function PgIndicadores(p){

  var manutencao=visiveis.filter(function(u){return u.status==='manutencao';}).length;

          return h('div',{key:i,style:{background:'#fff',border:'1px solid '+C.cl,borderRadius:12,padding:'14px 16px',display:'flex',gap:10,alignItems:'flex-start',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}},
            h('div',{style:{fontSize:22}},k.icon),
            h('div',null,
              h('div',{style:{fontSize:22,fontWeight:800,color:k.c,lineHeight:1}},k.v),
              h('div',{style:{fontSize:11,color:C.cm,marginTop:3}},k.l)
            )
          );
        })

      h('div',{style:{display:'grid',gridTemplateColumns:'1fr auto',gap:16,alignItems:'start',marginBottom:24,flexWrap:'wrap'}},
        h('div',{style:{background:'#fff',border:'1px solid '+C.cl,borderRadius:12,padding:'16px 18px',minWidth:0}},
          h('div',{style:{fontSize:11,fontWeight:700,color:C.cm,letterSpacing:.6,marginBottom:12}},'TAXA DE OCUPAÇÃO POR UNIDADE'),
          !topUns.length?h('div',{style:{color:C.cm,fontSize:12,textAlign:'center',padding:20}},'Nenhuma unidade cadastrada.'):
          h('div',{style:{overflowX:'auto'}},
            h('svg',{width:Math.max(topUns.length*(barW+8),200),height:barH+40,style:{display:'block'}},
              topUns.map(function(u,i){
                var x=i*(barW+8);
                var bh=Math.round((u.taxaUso/100)*barH);
                var fc=u.taxaUso>=80?C.rm:u.taxaUso>=60?C.am:C.g2;
                return h('g',{key:u.id},
                  h('rect',{x:x,y:barH-bh,width:barW,height:bh,fill:fc,rx:4}),
                  h('text',{x:x+barW/2,y:barH-bh-4,textAnchor:'middle',fontSize:9,fill:fc,fontWeight:700},u.taxaUso+'%'),
                  h('text',{x:x+barW/2,y:barH+14,textAnchor:'middle',fontSize:8,fill:C.cm,fontWeight:500},u.tipo),
                  h('text',{x:x+barW/2,y:barH+24,textAnchor:'middle',fontSize:7,fill:C.cm},u.municipio.length>10?u.municipio.slice(0,9)+'…':u.municipio)

            h('circle',{cx:cx2,cy:cy2,r:r,fill:'none',stroke:C.g2,strokeWidth:strokeW,strokeDasharray:dashCima+' '+(circum-dashCima),strokeDashoffset:circum/4,strokeLinecap:'round'}),
            h('circle',{cx:cx2,cy:cy2,r:r,fill:'none',stroke:C.b1,strokeWidth:strokeW,strokeDasharray:(circum-dashCima)+' '+dashCima,strokeDashoffset:circum/4-dashCima,strokeLinecap:'round'}),
            h('text',{x:cx2,y:cy2-6,textAnchor:'middle',fontSize:18,fontWeight:800,fill:C.cd},visiveis.length),
            h('text',{x:cx2,y:cy2+10,textAnchor:'middle',fontSize:9,fill:C.cm},'unidades')

        h('div',{style:{overflowX:'auto'}},
          h('table',{style:{width:'100%',fontSize:12,borderCollapse:'collapse'}},
            h('thead',null,h('tr',null,['Unidade','Tipo','Município','Regional','Ocupação','Status'].map(function(t){
              return h('th',{key:t,style:{textAlign:'left',padding:'7px 10px',borderBottom:'1px solid '+C.cl,color:C.cm,fontWeight:600,background:C.cx}},t);
            }))),
            h('tbody',null,visiveis.map(function(u,i){
              var sc=u.taxaUso>=80?C.rm:u.taxaUso>=60?C.am:C.g2;
              return h('tr',{key:u.id,style:{background:i%2?C.cx:'#fff'}},

              );

// ADMIN ALERTAS CONFIGURÁVEIS
// ══════════════════════════════════════════════════════════════════════════════
function AdminAlertas(p){
  var C=p.C,pers=p.pers,setPers=p.setPers,sysReport=p.sysReport,toast2=p.toast2;
  var rules=pers.alertRules||PERS_DEF.alertRules||[];
  function updateRule(id,field,val){
    setPers(function(pr){
      var ar=(pr.alertRules||[]).map(function(r){return r.id===id?Object.assign({},r,Object.assign({},r,{[field]:val})):r;});
      return Object.assign({},pr,{alertRules:ar});
    });
    toast2('Regra atualizada. A verificação será aplicada na próxima análise.');
  }
  var alertas=sysReport&&sysReport.alertas?sysReport.alertas:[];
  var tipoDesc={ocupacao_critica:'Dispara quando a taxa de uso de uma unidade supera o limite configurado.',sol_pendente_dias:'Dispara quando há solicitações pendentes há mais dias que o limite.',unidade_inativa:'Dispara quando unidades com status "inativo" são detectadas.'};
  return h('div',null,
    h('h2',{style:{fontSize:20,fontWeight:700,margin:'0 0 4px',color:C.cd}},'Alertas Críticos'),
    h('p',{style:{fontSize:13,color:C.cm,margin:'0 0 20px'}},'Configure as regras de monitoramento automático e veja os alertas ativos.'),
    h('div',{style:{fontSize:11,fontWeight:700,color:C.cm,letterSpacing:.6,marginBottom:12}},'REGRAS DE MONITORAMENTO'),
    h('div',{style:{display:'flex',flexDirection:'column',gap:12,marginBottom:24}},
      rules.map(function(r){
        return h('div',{key:r.id,style:{background:'#fff',border:'1px solid '+C.cl,borderRadius:12,padding:'14px 16px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
            h('div',null,
              h('div',{style:{fontSize:13,fontWeight:700,color:C.cd}},r.label),
              h('div',{style:{fontSize:11,color:C.cm,marginTop:2}},tipoDesc[r.tipo]||'')
            ),
            h('button',{onClick:function(){updateRule(r.id,'ativo',!r.ativo);},style:{padding:'5px 14px',borderRadius:8,border:'none',background:r.ativo?C.g2:C.cl,color:r.ativo?'#fff':C.cm,fontSize:12,fontWeight:600,cursor:'pointer'}},r.ativo?'Ativo':'Inativo')
          ),
          r.tipo!=='unidade_inativa'&&h('div',{style:{display:'flex',alignItems:'center',gap:10,marginTop:8}},
            h('label',{style:{fontSize:12,color:C.cd,fontWeight:600}},'Limite:'),
            h('input',{type:'number',value:r.threshold,min:1,max:r.tipo==='ocupacao_critica'?100:365,
              onChange:function(e){updateRule(r.id,'threshold',parseInt(e.target.value)||r.threshold);},
              style:{width:80,padding:'5px 8px',border:'1px solid '+C.cl,borderRadius:7,fontSize:12}}),
            h('span',{style:{fontSize:12,color:C.cm}},r.tipo==='ocupacao_critica'?'% de ocupação':'dias sem ação')
          )
        );
      })
    ),
    alertas.length>0&&h('div',null,
      h('div',{style:{fontSize:11,fontWeight:700,color:C.cm,letterSpacing:.6,marginBottom:12}},'ALERTAS ATIVOS AGORA ('+alertas.length+')'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        alertas.map(function(a,i){

  );
}

  useEffect(function(){
    var alive=true;

      }
      setDbOffline(false);

        addLog({type:'api_slow',sev:'warn',msg:'Carregamento lento: '+(ms/1000).toFixed(1)+'s',src:'apiFetchState',det:ms+'ms (ideal < 800ms)',sug:'Possível cold start do Supabase ou latência de rede.'});
      } else {
        addLog({type:'db_ok',sev:'ok',msg:'BD conectado (latência '+ms+'ms)',src:'apiFetchState',det:ms+'ms',sug:''});
      }
      if(Array.isArray(data.uns)) setUns(data.uns);
      if(Array.isArray(data.news)) setNews(data.news);
      if(Array.isArray(data.feeds)) setFeeds(data.feeds);
      if(Array.isArray(data.sols)) setSols(data.sols);
      if(Array.isArray(data.users)) setUsers(data.users);
      if(data.secs&&typeof data.secs==='object'&&!Array.isArray(data.secs)) setSecs(data.secs);
      if(data.pers&&typeof data.pers==='object') setPers(function(p){return Object.assign({},PERS_DEF,data.pers);});
    }).catch(function(e){
      console.warn('SAGCU remote load warning:',e&&e.message?e.message:e);
      if(alive){
        setDbOffline(true);
        addLog({type:'api_err',sev:'crit',msg:'Erro ao carregar estado: '+(e&&e.message?e.message.slice(0,80):String(e).slice(0,80)),src:'apiFetchState',det:'',sug:'Verificar Supabase e chave anon.'});
      }
    }).finally(function(){
      if(alive) setRemoteReady(true);
    });
    return function(){alive=false;};
  },[]);
  // Reconexão automática: se offline, tenta reconectar a cada 60s
  useEffect(function(){
    if(!dbOffline) return;
    var timer=setInterval(function(){
      apiFetchState().then(function(data){
        if(!data) return;
        setDbOffline(false);
        if(Array.isArray(data.uns)) setUns(data.uns);
        if(Array.isArray(data.news)) setNews(data.news);
        if(Array.isArray(data.feeds)) setFeeds(data.feeds);
        if(Array.isArray(data.sols)) setSols(data.sols);
        if(Array.isArray(data.users)) setUsers(data.users);
        if(data.secs&&typeof data.secs==='object'&&!Array.isArray(data.secs)) setSecs(data.secs);
        if(data.pers&&typeof data.pers==='object') setPers(function(pr){return Object.assign({},PERS_DEF,data.pers);});
        addLog({type:'db_ok',sev:'ok',msg:'Reconectado ao BD automaticamente',src:'reconnect',det:'',sug:''});
      }).catch(function(){});

  },[dbOffline]);
  useEffect(function(){

  useEffect(function(){

    }
    window.addEventListener('unhandledrejection',onUnhandled);

  function saveUn(f){if(f.id)setUns(function(us){return us.map(function(u){return u.id===f.id?f:u;});});else setUns(function(us){return us.concat([Object.assign({},f,{id:Date.now()})]);});setModal(null);toast2("Unidade salva.");}

    feeds.filter(function(f){return f.ativo;}).length===0&&{sev:"media",titulo:"Nenhum feed RSS ativo",det:"As notícias externas não estão sendo atualizadas.",sug:"Ativar ao menos um feed confiável e agendar sincronização semanal."},
    users.filter(function(u){return u.ativo;}).length===0&&{sev:"alta",titulo:"Não existem usuários ativos",det:"O painel administrativo pode ficar sem operação.",sug:"Reativar um administrador imediatamente para evitar indisponibilidade de gestão."},

  var alertasFuncionalidade=[

    unidadesSemCoords.length>0&&{sev:"alta",titulo:"Unidades com coordenadas inválidas",det:""+unidadesSemCoords.length+" unidade(s) não aparecerão corretamente no mapa.",sug:"Corrigir latitude/longitude no cadastro de unidades para restaurar visualização geográfica."},
    unidadesTaxaInvalida.length>0&&{sev:"media",titulo:"Taxa de uso fora da faixa esperada (0-100)",det:""+unidadesTaxaInvalida.length+" unidade(s) com valor inválido.",sug:"Padronizar taxa de uso entre 0% e 100% para evitar distorções no dashboard."},
    solicitacoesComErro.length>0&&{sev:"alta",titulo:"Solicitações com dados incompletos ou inválidos",det:""+solicitacoesComErro.length+" registro(s) com falha de dados.",sug:"Revisar solicitações com data/status inválidos para manter o fluxo de aprovação confiável."},
    noticiasSemData.length>0&&{sev:"media",titulo:"Notícias sem data válida",det:""+noticiasSemData.length+" notícia(s) podem ficar fora da ordenação cronológica.",sug:"Preencher data no formato AAAA-MM-DD para preservar histórico e filtros."},
