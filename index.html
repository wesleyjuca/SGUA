// SEGURANÇA — SHA-256 puro JS (sync) · sem dependências externas
// ══════════════════════════════════════════════════════════════════════════════
function sha256(msg){
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
         0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
         0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
         0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
         0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
         0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
         0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
         0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  function rr(w,n){return(w>>>n)|(w<<(32-n));}
  // UTF-8 encode (suporta pares substitutos / emoji)
  var bytes=Array.from(new TextEncoder().encode(String(msg||'')));
  var blen=bytes.length*8;
  bytes.push(0x80);
  while(bytes.length%64!==56)bytes.push(0);
  for(var i=7;i>=0;i--)bytes.push((blen/Math.pow(2,i*8))&255);
  // Process chunks
  for(var ck=0;ck<bytes.length;ck+=64){
    var w=[];
    for(var i=0;i<16;i++)w[i]=(bytes[ck+i*4]<<24)|(bytes[ck+i*4+1]<<16)|(bytes[ck+i*4+2]<<8)|bytes[ck+i*4+3];
    for(var i=16;i<64;i++){
      var s0=rr(w[i-15],7)^rr(w[i-15],18)^(w[i-15]>>>3);
      var s1=rr(w[i-2],17)^rr(w[i-2],19)^(w[i-2]>>>10);
      w[i]=(w[i-16]+s0+w[i-7]+s1)>>>0;
    }
    var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],hh=H[7];
    for(var i=0;i<64;i++){
      var S1=rr(e,6)^rr(e,11)^rr(e,25),ch=(e&f)^(~e&g);
      var t1=(hh+S1+ch+K[i]+w[i])>>>0;
      var S0=rr(a,2)^rr(a,13)^rr(a,22),maj=(a&b)^(a&c)^(b&c);
      var t2=(S0+maj)>>>0;
      hh=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;
    }
    H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;
    H[4]=(H[4]+e)>>>0;H[5]=(H[5]+f)>>>0;H[6]=(H[6]+g)>>>0;H[7]=(H[7]+hh)>>>0;
  }
  return H.map(function(n){return('00000000'+(n>>>0).toString(16)).slice(-8);}).join('');
}

// Sanitização — remove tags HTML e limita comprimento
function sanitize(str,maxLen){
  if(typeof str!=='string')return '';
  var s=str.replace(/<[^>]*>/g,'').replace(/[<>"'`]/g,'').trim();
  return maxLen?s.slice(0,maxLen):s;
}

function fileToDataUrl(file){
  return new Promise(function(resolve,reject){
    if(!file) return resolve("");
    var reader=new FileReader();
    reader.onload=function(){resolve(String(reader.result||""));};
    reader.onerror=function(){reject(new Error("Falha ao processar arquivo."));};
    reader.readAsDataURL(file);
  });
}

// Validação de campos com regras declarativas
// rules: [{field, label, required, maxLen, pattern, patternMsg}]
function validateFields(obj,rules){
  var errs=[];
  rules.forEach(function(r){
    var v=obj[r.field];
    if(r.required&&(!v||String(v).trim()===''))errs.push(r.label+' é obrigatório.');
    if(v&&r.maxLen&&String(v).length>r.maxLen)errs.push(r.label+': máximo '+r.maxLen+' caracteres.');
    if(v&&r.pattern&&!r.pattern.test(String(v)))errs.push(r.label+': '+(r.patternMsg||'formato inválido'));
    if(v&&r.min!==undefined&&Number(v)<r.min)errs.push(r.label+': mínimo '+r.min+'.');
    if(v&&r.max!==undefined&&Number(v)>r.max)errs.push(r.label+': máximo '+r.max+'.');
  });
  return errs; // [] = válido
}


// ══════════════════════════════════════════════════════════════════════════════
// PERSISTÊNCIA — localStorage (dados de negócio apenas, jamais senhas)
// ══════════════════════════════════════════════════════════════════════════════
var SK='sagcu_v4_'; // versão do schema — bump para invalidar cache antigo
var LS_WARNED={};
function storageWarnOnce(code,msg){
  if(LS_WARNED[code]) return;
  LS_WARNED[code]=true;
  console.warn('SAGCU storage warning:',msg);
}
function lsGet(key,fallback){
  var storageKey=SK+key;
  try{
    var r=localStorage.getItem(storageKey);
    if(!r) return fallback;
    try{return JSON.parse(r);}
    catch(e){
      storageWarnOnce('parse_'+key,'Dados corrompidos em "'+storageKey+'". Cache local foi resetado para este item.');
      localStorage.removeItem(storageKey);
      return fallback;
    }
  }catch(e){
    storageWarnOnce('read_'+key,'Falha ao ler "'+storageKey+'": '+(e&&e.message?e.message:String(e)));
    return fallback;
  }
}
function lsSet(key,data){
  var storageKey=SK+key;
  try{localStorage.setItem(storageKey,JSON.stringify(data));return true;}
  catch(e){
    storageWarnOnce('write_'+key,'Falha ao persistir "'+storageKey+'": '+(e&&e.message?e.message:String(e)));
    return false;
  }
}
function lsClear(){
  try{Object.keys(localStorage).filter(function(k){return k.startsWith(SK);}).forEach(function(k){localStorage.removeItem(k);});}
  catch(e){
    storageWarnOnce('clear','Falha ao limpar cache local: '+(e&&e.message?e.message:String(e)));
  }
}

// Backend API (opcional): quando disponível, sincroniza dados com SQLite via /api/state
var API_BASE=(window.SAGCU_API_BASE||'').replace(/\/$/,'');
var API_ENABLED=typeof window!=='undefined'&&window.location&&window.location.protocol.indexOf('http')===0;
function apiUrl(path){return(API_BASE||'')+path;}
function apiFetchState(){
  if(!API_ENABLED) return Promise.resolve(null);
  return fetch(apiUrl('/api/state'),{headers:{'Accept':'application/json'}}).then(function(r){
    if(!r.ok) throw new Error('Falha ao carregar estado remoto ('+r.status+')');
    return r.json();
  });
}
function apiSaveState(payload){
  if(!API_ENABLED) return Promise.resolve();
  return fetch(apiUrl('/api/state'),{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(function(r){
    if(!r.ok) throw new Error('Falha ao salvar estado remoto ('+r.status+')');
    return r.json();
  });
}
function apiSyncFeeds(feeds,news){
  if(!API_ENABLED) return Promise.resolve({ok:false,error:'Sincronização requer servidor HTTP ativo.'});
  return fetch(apiUrl('/api/feeds/sync'),{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({feeds:feeds,news:news})
  }).then(function(r){
    if(!r.ok) throw new Error('Falha ao sincronizar feeds ('+r.status+')');
    return r.json();
  });
}


// ══════════════════════════════════════════════════════════════════════════════
// DOMÍNIO — approveUso(uns, setUns, unidadeId, orgaoData) : {ok, err?, orgao?}
// Regras:
//   1. Unidade deve existir e estar ativa (status !== 'inativo')
//   2. Impede duplicação: mesmo orgão ativo na mesma unidade
//   3. Incrementa ocupacaoAtual
//   4. Insere registro {id, nome, tipo, dataEntrada, ativo:true}
//   5. Persiste no estado (setUns) e no localStorage
// ══════════════════════════════════════════════════════════════════════════════
function approveUso(uns, setUns, unidadeId, orgaoData){
  // 1. Encontrar unidade
  var u=uns.find(function(x){return x.id===unidadeId;});
  if(!u) return {ok:false, err:'Unidade não encontrada (id='+unidadeId+')'};
  if(u.status==='inativo') return {ok:false, err:'Unidade "'+u.nome+'" está inativa e não pode receber órgãos.'};

  // 2. Sanitizar e validar campos do orgão
  var nome=sanitize(String(orgaoData.nome||''),100);
  var tipo=sanitize(String(orgaoData.tipo||''),60);
  var errs=validateFields({nome:nome,tipo:tipo},[
    {field:'nome',label:'Nome do órgão',required:true,maxLen:100},
    {field:'tipo',label:'Tipo do evento',required:true,maxLen:60}
  ]);
  if(errs.length) return {ok:false, err:errs.join(' ')};

  // 3. Impedir duplicação — mesmo orgão ativo na unidade
  var presentes=u.orgaosPresentes||[];
  var jaAtivo=presentes.find(function(o){
    return o.ativo && o.nome.toLowerCase()===nome.toLowerCase();
  });
  if(jaAtivo) return {ok:false, err:'Órgão "'+nome+'" já está ativo nesta unidade desde '+formatData(jaAtivo.dataEntrada)+'.'};

  // 4. Criar registro do órgão
  var novoOrgao={
    id:String(Date.now())+'_'+Math.random().toString(36).slice(2,6),
    nome:nome,
    tipo:tipo,
    dataEntrada:new Date().toISOString().split('T')[0],
    ativo:true
  };

  // 5. Persistir — atualizar estado e localStorage
  var resultado={ok:true, orgao:novoOrgao};
  setUns(function(us){
    var atualizadas=us.map(function(un){
      if(un.id!==unidadeId) return un;
      var novaLista=(un.orgaosPresentes||[]).concat([novoOrgao]);
      var ativos=novaLista.filter(function(o){return o.ativo;}).length;
      return Object.assign({},un,{orgaosPresentes:novaLista, ocupacaoAtual:ativos});
    });
    lsSet('uns',atualizadas); // persistência imediata
    return atualizadas;
  });
  return resultado;
}

// leaveUso — desativa um órgão na unidade (checkout)
function leaveUso(uns, setUns, unidadeId, orgaoId){
  var u=uns.find(function(x){return x.id===unidadeId;});
  if(!u) return {ok:false, err:'Unidade não encontrada'};
  var org=(u.orgaosPresentes||[]).find(function(o){return o.id===orgaoId;});
  if(!org) return {ok:false, err:'Órgão não encontrado nesta unidade'};
  if(!org.ativo) return {ok:false, err:'Órgão já está inativo'};

  setUns(function(us){
    var atualizadas=us.map(function(un){
      if(un.id!==unidadeId) return un;
      var novaLista=(un.orgaosPresentes||[]).map(function(o){
        return o.id===orgaoId?Object.assign({},o,{ativo:false,dataSaida:new Date().toISOString().split('T')[0]}):o;
      });
      var ativos=novaLista.filter(function(o){return o.ativo;}).length;
      return Object.assign({},un,{orgaosPresentes:novaLista, ocupacaoAtual:ativos});
    });
    lsSet('uns',atualizadas);
    return atualizadas;
  });
  return {ok:true};
}

// Gera linhas de ocupação a partir das unidades
function buildOcupacaoRows(uns){
  var rows=[];
  uns.forEach(function(u){
    (u.orgaosPresentes||[]).forEach(function(o){
      rows.push({
        unidade:u.nome, tipo:u.tipo, municipio:u.municipio,
        orgNome:o.nome, orgTipo:o.tipo,
        dataEntrada:o.dataEntrada, dataSaida:o.dataSaida||'', ativo:o.ativo
      });
    });
  });
  return rows;
}

// --- Exportação CSV ---
function escapeCsvCell(v){
  var s=String(v===null||v===undefined?'':v);
  s=s.replace(/[\r\n]+/g,' ');
  if(s.indexOf(',')!==-1||s.indexOf('"')!==-1||s.indexOf(';')!==-1){
    s='"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}
function exportCSV(rows, cols, filename){
  var lines=[cols.map(function(c){return '"'+c.label+'"';}).join(',')];
  rows.forEach(function(row){
    lines.push(cols.map(function(c){return escapeCsvCell(c.fmt(row));}).join(','));
  });
  var blob=new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
}

// --- Exportação XLSX (SheetJS obrigatório) ---
function exportXLSX(rows, cols, filename){
  if(typeof XLSX==='undefined'){alert('SheetJS não carregado. Use a exportação CSV.');return;}
  var data=[cols.map(function(c){return c.label;})];
  rows.forEach(function(row){
    data.push(cols.map(function(c){
      var v=c.fmt(row);
      return(v===null||v===undefined)?'':v;
    }));
  });
  var ws=XLSX.utils.aoa_to_sheet(data);
  // Largura automática
  var wscols=cols.map(function(c,i){
    var max=c.label.length;
    rows.forEach(function(row){var v=String(c.fmt(row)||'');if(v.length>max)max=v.length;});
    return{wch:Math.min(Math.max(max+2,8),60)};
  });
  ws['!cols']=wscols;
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Dados');
  XLSX.writeFile(wb,filename);
}

// --- Parser CSV robusto (RFC 4180) ---
function parseCSVLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=ch;
  }
  result.push(cur.trim());
  return result;
}
function parseCSV(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2) return{headers:[],rows:[]};
  var headers=parseCSVLine(lines[0]).map(function(h){return h.replace(/^"+|"+$/g,'');});
  var rows=lines.slice(1).map(function(line){
    var vals=parseCSVLine(line);
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]!==undefined?vals[i].replace(/^"+|"+$/g,''):'';});
    return obj;
  });
  return{headers:headers,rows:rows};
}

// --- Validação de linha importada (unidades) ---
var UN_IMPORT_RULES=[
  {field:'tipo',  label:'Tipo',  required:true, pattern:/^(CIMA|UGAI)$/, patternMsg:'deve ser CIMA ou UGAI'},
  {field:'nome',  label:'Nome',  required:true, maxLen:100},
  {field:'municipio',label:'Município',required:true,maxLen:80},
  {field:'regional',label:'Regional', required:false,maxLen:60},
  {field:'status',label:'Status',required:false,pattern:/^(ativo|manutencao|inativo)$/,patternMsg:'deve ser ativo, manutencao ou inativo'},
  {field:'taxaUso',label:'Taxa Uso',required:false,min:0,max:100}
];
function validateUnRow(row){
  var errs=validateFields(row,UN_IMPORT_RULES);
  var lat=parseFloat(row.lat||row['Latitude']||'');
  var lng=parseFloat(row.lng||row['Longitude']||'');
  if(isNaN(lat)||lat<-90||lat>90) errs.push('Latitude inválida (esperado -90 a 90)');
  if(isNaN(lng)||lng<-180||lng>180) errs.push('Longitude inválida (esperado -180 a 180)');
  return errs;
}

// Mapear linha CSV para objeto unidade
function csvRowToUnidade(row){
  var lat=parseFloat(row.lat||row['Latitude']||'');
  var lng=parseFloat(row.lng||row['Longitude']||'');
  return{
    id:null, // será atribuído no merge
    tipo:sanitize(row.tipo||row['Tipo']||'CIMA',10),
    nome:sanitize(row.nome||row['Nome']||'',100),
    municipio:sanitize(row.municipio||row['Município']||'',80),
    regional:sanitize(row.regional||row['Regional']||'Vale do Juruá',60),
    coords:{lat:isNaN(lat)?-9.5:lat, lng:isNaN(lng)?-70.5:lng},
    status:(row.status||row['Status']||'ativo'),
    taxaUso:Math.min(100,Math.max(0,parseInt(row.taxaUso||row['Taxa Uso(%)'||'Taxa Uso']||'0'))),
    orgaos:(row.orgaos||row['Órgãos']||'').split(';').map(function(s){return s.trim();}).filter(Boolean),
    quartos:parseInt(row.quartos||row['Quartos']||'0')||0,
    salas:parseInt(row.salas||row['Salas']||'0')||0,
    cozinha:(row.cozinha||row['Cozinha']||'Não').toLowerCase()==='sim',
    auditorio:(row.auditorio||row['Auditório']||'Não').toLowerCase()==='sim',
    visivel:(row.visivel||row['Visível']||'Sim').toLowerCase()!=='não',
    decreto:sanitize(row.decreto||row['Decreto']||'',120),
    descricao:sanitize(row.descricao||row['Descrição']||'',500),
    historia:'', foto:'', galeria:[], extras:[], orgaosPresentes:[], ocupacaoAtual:0
  };
}

// Aplicar import com estratégia merge ou overwrite
// strategy: 'merge' (mantém existentes) | 'overwrite' (substitui por nome)
function applyImport(uns, parsedRows, strategy){
  var valid=parsedRows.filter(function(r){return r._errs.length===0;});
  if(!valid.length) return uns;
  if(strategy==='overwrite'){
    var novos=valid.map(function(r){return Object.assign({},r._obj,{id:Date.now()+Math.random()});});
    var nomesNovos=novos.map(function(u){return u.nome.toLowerCase();});
    // manter unidades que não estão no import e adicionar as novas
    var mantidos=uns.filter(function(u){return nomesNovos.indexOf(u.nome.toLowerCase())===-1;});
    return mantidos.concat(novos);
  } else { // merge
    var result=uns.slice();
    valid.forEach(function(r){
      var obj=r._obj;
      var existeIdx=result.findIndex(function(u){return u.nome.toLowerCase()===obj.nome.toLowerCase();});
      if(existeIdx===-1){
        result.push(Object.assign({},obj,{id:Date.now()+Math.random()}));
      }
      // merge: ignora existentes (deduplicação por nome)
    });
    return result;
  }
}

// AdminRelatorios — aba de relatórios com export/import

  var uns=p.uns,setUns=p.setUns,news=p.news,sols=p.sols,toast2=p.toast2;
  var sT=useState('export');var tab=sT[0],setTab=sT[1];
  var sDS=useState('uns');var dataset=sDS[0],setDataset=sDS[1];
  var sFmt=useState('csv');var fmt=sFmt[0],setFmt=sFmt[1];
  var sSt=useState('merge');var strategy=sSt[0],setStrategy=sSt[1];
  var sPR=useState(null);var parsedRows=sPR[0],setParsedRows=sPR[1];
  var sFL=useState('');var fileName=sFL[0],setFileName=sFL[1];
  var sLoad=useState(false);var loading=sLoad[0],setLoading=sLoad[1];

  var DATASETS={
    uns:{label:'Unidades',cols:UN_COLS,rows:uns},
    news:{label:'Notícias',cols:NW_COLS,rows:news},
    sols:{label:'Solicitações',cols:SOL_COLS,rows:sols},
    ocp:{label:'Ocupação por Órgão',cols:OCP_COLS,rows:buildOcupacaoRows(uns)}
  };
  var ds=DATASETS[dataset];

  function doExport(){
    var ts=new Date().toISOString().slice(0,10);
    var base='SEMA_'+ds.label.replace(/ /g,'_')+'_'+ts;
    if(fmt==='xlsx') exportXLSX(ds.rows,ds.cols,base+'.xlsx');
    else exportCSV(ds.rows,ds.cols,base+'.csv');
    toast2('Exportado: '+base+'.'+(fmt==='xlsx'?'xlsx':'csv'));
  }

  function handleFile(e){
    var file=e.target.files[0];
    if(!file){setParsedRows(null);return;}
    setFileName(file.name);
    setLoading(true);
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var rows=[];
        var isXlsx=file.name.toLowerCase().endsWith('.xlsx');
        if(isXlsx){
          if(typeof XLSX==='undefined'){alert('SheetJS não carregado. Use CSV.');setLoading(false);return;}
          var wb=XLSX.read(ev.target.result,{type:'binary'});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var data=XLSX.utils.sheet_to_json(ws,{defval:''});
          rows=data.map(function(r){
            var errs=validateUnRow(r);
            return{_raw:r,_errs:errs,_obj:errs.length===0?csvRowToUnidade(r):null};
          });
        } else {
          var parsed=parseCSV(ev.target.result);
          rows=parsed.rows.map(function(r){
            var errs=validateUnRow(r);
            return{_raw:r,_errs:errs,_obj:errs.length===0?csvRowToUnidade(r):null};
          });
        }
        setParsedRows(rows);
      }catch(err){toast2('Erro ao processar arquivo: '+err.message,C.rm);}
      setLoading(false);
    };
    if(file.name.toLowerCase().endsWith('.xlsx'))reader.readAsBinaryString(file);
    else reader.readAsText(file,'UTF-8');
  }

  function doImport(){
    if(!parsedRows) return;
    var valid=parsedRows.filter(function(r){return r._errs.length===0;});
    if(!valid.length){toast2('Nenhuma linha válida para importar.',C.am);return;}
    var novas=applyImport(uns,parsedRows,strategy);
    setUns(novas);
    lsSet('uns',novas);
    toast2(valid.length+' unidade(s) importada(s) com estratégia "'+strategy+'".');
    setParsedRows(null);setFileName('');

        h('label',{style:{fontSize:11,fontWeight:700,color:C.cm,display:'block',marginBottom:8}},'FORMATO'),
        h('div',{style:{display:'flex',gap:8}},
          [['csv','📄 CSV (UTF-8)'],['xlsx','📊 Excel (XLSX)']].map(function(f){
            return h('button',{key:f[0],onClick:function(){setFmt(f[0]);},
              style:Object.assign({},btnBase,{
                background:fmt===f[0]?C.gx:'#fff',
                color:fmt===f[0]?C.g2:C.cm,
                border:'1px solid '+(fmt===f[0]?C.g2:C.cl)
              })
            },f[1]);
          })
        )
      ),

      // Preview das colunas
      h(Card,{style:{padding:'16px 18px',marginBottom:16}},
        h('div',{style:{fontSize:11,fontWeight:700,color:C.cm,marginBottom:8,letterSpacing:.5}},'COLUNAS DO RELATÓRIO'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          ds.cols.map(function(c){return h('span',{key:c.key,style:{fontSize:11,padding:'2px 8px',borderRadius:10,background:C.cx,color:C.cm}},c.label);})
        ),
        h('div',{style:{marginTop:10,fontSize:12,color:C.cm}},ds.rows.length+' registro(s) serão exportados.')
      ),

      h('button',{onClick:doExport,

      },'⬇ Baixar '+ds.label+'.'+fmt)
    ),

    // ─── ABA IMPORTAR ───────────────────────────────────────────

        ),'. Exporte uma planilha existente para ver o modelo exato.'
      ),

      h('div',{style:{marginBottom:16}},
        h('label',{style:{fontSize:11,fontWeight:700,color:C.cm,display:'block',marginBottom:8}},'ESTRATÉGIA'),
        h('div',{style:{display:'flex',gap:8}},
          [['merge','🔀 Merge (adicionar novas, manter existentes)'],['overwrite','♻ Overwrite (substituir por nome)']].map(function(st){
            return h('button',{key:st[0],onClick:function(){setStrategy(st[0]);},
              style:Object.assign({},btnBase,{
                background:strategy===st[0]?C.al:'#fff',

          })

        h('div',{style:{fontSize:11,color:C.cm,marginTop:6}},

                             'Unidades com mesmo nome são substituídas. Novas são adicionadas. Unidades sem correspondência são mantidas.'
        )
      ),

      // Input de arquivo
      h('div',{style:{marginBottom:16}},
        h('label',{style:{display:'inline-block',padding:'10px 20px',borderRadius:9,border:'1.5px dashed '+C.cl,cursor:'pointer',fontSize:13,color:C.g2,fontWeight:600}},

          h('input',{type:'file',accept:'.csv,.xlsx',onChange:handleFile,style:{display:'none'}})
        ),

// Painel de órgãos presentes numa unidade (exibido na aba 'estrutura')
function PainelOcupacao(p){
  var u=p.u,uns=p.uns,setUns=p.setUns,curUser=p.curUser,toast2=p.toast2;
  var sNome=useState('');var nome=sNome[0],setNome=sNome[1];

  var sErr=useState('');var err=sErr[0],setErr=sErr[1];
  var presentes=u.orgaosPresentes||[];
  var ativos=presentes.filter(function(o){return o.ativo;});
  var historico=presentes.filter(function(o){return!o.ativo;});

  function handleApprove(){
    setErr('');
    var res=approveUso(uns,setUns,u.id,{nome:nome,tipo:tipo});
    if(res.ok){setNome('');setTipo('');toast2('Órgão "'+res.orgao.nome+'" registrado com sucesso.');}
    else{setErr(res.err);}
  }
  function handleLeave(orgaoId){
    var res=leaveUso(uns,setUns,u.id,orgaoId);
    if(res.ok) toast2('Saída registrada.');
    else setErr(res.err);
  }

  var cor=u.tipo==='CIMA'?C.g2:C.b1;
  var podeEditar=curUser&&(curUser.perfil==='admin'||curUser.permissoes.units);
  var lbl={fontSize:11,color:C.cm,display:'block',marginBottom:4,fontWeight:600};

  return h('div',null,
    // Resumo
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:20}},
      h(StatBox,{label:'Órgãos ativos',value:ativos.length,color:C.g2,icon:'🏢'}),

      ativos.map(function(o){
        return h('div',{key:o.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'0.5px solid '+C.cl,flexWrap:'wrap',gap:6}},

          ),
          podeEditar&&h('button',{onClick:function(){handleLeave(o.id);},
            style:{padding:'4px 12px',borderRadius:7,border:'1px solid '+C.rm,background:C.rl,color:C.rm,fontSize:11,cursor:'pointer'}
          },'Registrar saída')
        );
      })
    ),

    // Formulário de entrada (só para quem pode editar)
    podeEditar&&h(Card,{style:{padding:'16px 18px',marginBottom:14}},
      h('div',{style:{fontSize:11,fontWeight:700,color:C.g2,marginBottom:12,letterSpacing:.5}},'REGISTRAR ENTRADA DE ÓRGÃO'),
      err&&h('div',{style:{background:C.rl,borderRadius:7,padding:'8px 12px',fontSize:12,color:C.rm,marginBottom:10}},err),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:10,alignItems:'flex-end'}},
        h('div',null,
          h('label',{style:lbl},'Nome do órgão *'),
          h('input',{value:nome,onChange:function(e){setNome(e.target.value);},placeholder:'Ex: SEAGRI, IBAMA...'})
        ),
        h('div',null,
          h('label',{style:lbl},'Tipo de uso *'),
          h('input',{value:tipo,onChange:function(e){setTipo(e.target.value);},placeholder:'Ex: Capacitação, Reunião...'})
        ),
        h('button',{onClick:handleApprove,
          style:{padding:'8px 14px',borderRadius:8,border:'none',background:C.g2,color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}
        },'+ Registrar')
      )
    ),

    // Histórico de saídas
    historico.length>0&&h('div',null,
      h('div',{style:{fontSize:11,fontWeight:700,color:C.cm,marginBottom:8,letterSpacing:.5}},'HISTÓRICO DE SAÍDAS'),
      historico.map(function(o){
        return h('div',{key:o.id,style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'0.5px solid '+C.cl,fontSize:12,color:C.cm}},
          h('span',null,o.nome+' ('+o.tipo+')'),
          h('span',null,formatData(o.dataEntrada)+' → '+(o.dataSaida?formatData(o.dataSaida):'—'))
        );
      })
    ),

    !ativos.length&&!podeEditar&&h('p',{style:{fontSize:13,color:C.cm,fontStyle:'italic'}},'Nenhum órgão ativo no momento.')
  );
}

function MapView(p){
  var units=p.units||[],height=p.height||"400px",compact=p.compact||false,
      singleUnit=p.singleUnit||false,onSelectUnit=p.onSelectUnit;
  var valid=useMemo(function(){return units.filter(function(u){return u.coords&&u.coords.lat&&u.coords.lng;});},[units]);
  var key=useMemo(function(){return JSON.stringify(valid.map(function(u){return u.id;}));},[valid]);
  var html=useMemo(function(){return buildMapHtml(valid,compact,singleUnit);},[key,compact,singleUnit]);

  useEffect(function(){
    function handler(e){if(e.data&&e.data.type==="SELECT_UNIT"&&onSelectUnit)onSelectUnit(e.data.unitId);}
    window.addEventListener("message",handler);
    return function(){window.removeEventListener("message",handler);};
  },[onSelectUnit]);

  if(!valid.length) return h("div",{style:{height:height,borderRadius:12,background:C.cx,display:"flex",alignItems:"center",justifyContent:"center",color:C.cm,fontSize:14,border:"1px solid "+C.cl}},"Nenhuma unidade com coordenadas válidas.");
  return h("iframe",{key:key,srcDoc:html,sandbox:"allow-scripts allow-same-origin",style:{width:"100%",height:height,border:"none",borderRadius:12,display:"block"},title:"Mapa SEMA/AC"});
}

function PgMapa(p){
  var uns=p.uns,onVerUnidade=p.onVerUnidade;
  var isMobile=typeof window!=="undefined"&&window.innerWidth<=768;
  var sFT=useState("");var filtroTipo=sFT[0],setFiltroTipo=sFT[1];
  var sFM=useState("");var filtroMun=sFM[0],setFiltroMun=sFM[1];
  var sB=useState("");var busca=sB[0],setBusca=sB[1];
  var sS=useState(null);var selId=sS[0],setSelId=sS[1];
  var municipios=useMemo(function(){return[...new Set(uns.map(function(u){return u.municipio;}))].sort();},[uns]);
  var filtradas=useMemo(function(){return uns.filter(function(u){
    if(!u.visivel)return false;
    if(filtroTipo&&u.tipo!==filtroTipo)return false;
    if(filtroMun&&u.municipio!==filtroMun)return false;
    if(busca&&!u.nome.toLowerCase().includes(busca.toLowerCase())&&!u.municipio.toLowerCase().includes(busca.toLowerCase()))return false;
    return true;
  });},[uns,filtroTipo,filtroMun,busca]);

  var handleSelectUnit=useCallback(function(unitId){
    setSelId(unitId);var u=uns.find(function(x){return x.id===unitId;});if(u)onVerUnidade(u);
  },[uns,onVerUnidade]);

  return h("div",{style:{display:"flex",flexDirection:"column",height:isMobile?"calc(100vh - 46px)":"calc(100vh - 52px)"}},
    // Toolbar
    h("div",{style:{background:"#fff",borderBottom:"1px solid "+C.cl,padding:"10px 16px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",flexShrink:0,zIndex:10}},
      h("div",{style:{position:"relative",flex:1,minWidth:160}},
        h("span",{style:{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}},"🔍"),
        h("input",{value:busca,onChange:function(e){setBusca(e.target.value);},placeholder:"Buscar unidade…",style:{paddingLeft:30,width:"100%",boxSizing:"border-box",fontSize:13}})
      ),
      h("select",{value:filtroMun,onChange:function(e){setFiltroMun(e.target.value);},style:{fontSize:12,padding:"7px 10px",border:"1px solid "+C.cl,borderRadius:8,background:"#fff",color:C.cd,outline:"none",cursor:"pointer"}},
        h("option",{value:""},"Todos os municípios"),
        municipios.map(function(m){return h("option",{key:m},m);})

  var sNP=useState("");var newPwd=sNP[0],setNewPwd=sNP[1];

    if(!u){setErr("E-mail ou senha incorretos.");return;}

    var u=users.find(function(x){return x.email.toLowerCase()===resetEmail.toLowerCase();});
    if(!u){setErr("E-mail não cadastrado.");return;}
    setResetToken(Math.random().toString(36).slice(2,8).toUpperCase());setTokenSent(true);setErr("");

    if(!newPwd||newPwd.length<6){setErr("Senha deve ter pelo menos 6 caracteres.");return;}
    if(newPwd!==newPwd2){setErr("As senhas não coincidem.");return;}
    setUsers(function(us){return us.map(function(u){return u.email.toLowerCase()===resetEmail.toLowerCase()?Object.assign({},u,{pwdHash:hashPwd(newPwd)}):u;});});
